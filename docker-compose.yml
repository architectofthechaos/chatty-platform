services:
  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatty}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ./app
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatty}:${POSTGRES_PASSWORD:-chatty}@db:5432/${POSTGRES_DB:-chatty}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
