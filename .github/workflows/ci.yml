# CI Pipeline for Chatty Backend
#
# Job dependency graph:
#   lint ──┐
#          ├──> build (Docker image)
#   test ──┤
#          └──> openapi (spec artifact)
#
# lint and test run in parallel (no `needs` key).
# build and openapi only run after both pass.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.2.0

      # Cache Poetry's virtualenv + package cache to speed up subsequent runs.
      # Key is based on the lock file -- cache busts when dependencies change.
      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('app/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      # Two checks: linting rules (ruff check) and formatting consistency (ruff format --check).
      # Both must pass -- enforces code style across all contributors.
      - name: Run ruff linter
        run: poetry run ruff check src/ tests/

      - name: Run ruff formatter check
        run: poetry run ruff format --check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.2.0

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('app/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      # JUnit XML output enables GitHub to surface test results in the PR UI.
      # Artifact upload uses if: always() so results are available even on failure.
      - name: Run unit tests
        run: poetry run pytest -W ignore --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/test-results.xml

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    # Gate on lint + test -- no point building an image from broken code.
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      # Validates the Dockerfile builds successfully. Image is not pushed
      # to a registry -- that would be a CD step in a deploy workflow.
      - name: Build Docker image
        run: docker build -t chatty-backend:${{ github.sha }} ./app

  openapi:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest
    # Gate on lint + test -- spec should only be generated from verified code.
    needs: [lint, test]
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==2.2.0

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('app/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction

      # Generates the spec offline by importing the FastAPI app directly --
      # no server startup needed. Artifact is downloadable from the Actions tab.
      - name: Generate OpenAPI spec
        run: poetry run python scripts/generate_openapi.py openapi.json

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: app/openapi.json
